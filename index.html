<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Оставить заявку</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7c600, #111111);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      color: #111111;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #555555;
      text-align: center;
      font-size: 15px;
      line-height: 1.4;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
      color: #222222;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 14px 15px;
      margin-bottom: 17px;
      border: 1px solid #d7d7d7;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #f7c600;
      box-shadow: 0 0 0 3px rgba(247, 198, 0, 0.25);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #111111;
      color: #ffffff;
      padding: 15px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #333333;
      transform: translateY(-1px);
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #777777;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Оставить заявку</h1>

    <p class="subtitle">
      Заполните форму, и мы свяжемся с вами в удобное время.
    </p>

    <form action="https://formsubmit.co/Anna.migacheva.84@mail.ru" method="POST">

      <input type="hidden" name="_subject" value="Новая заявка с сайта">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">

      <label for="name">ФИО</label>
      <input 
        type="text" 
        id="name" 
        name="ФИО" 
        placeholder="Иванов Иван Иванович" 
        required
      >

      <label for="phone">Контактный телефон</label>
      <input 
        type="tel" 
        id="phone" 
        name="Телефон" 
        placeholder="+7 999 123-45-67" 
        required
      >

      <label for="time">Удобное время для связи</label>
      <select id="time" name="Удобное время для связи" required>
        <option value="">Выберите время</option>
        <option value="Утром">Утром</option>
        <option value="Днем">Днем</option>
        <option value="Вечером">Вечером</option>
        <option value="В любое время">В любое время</option>
      </select>

      <button type="submit">Отправить заявку</button>
    </form>

    <div class="note">
      Нажимая кнопку, вы отправляете контактные данные для обратной связи.
    </div>
  </div>
</body>
</html>
